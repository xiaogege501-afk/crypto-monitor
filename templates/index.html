<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多周期趋势监控台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0d13;
    --panel: #12161f;
    --panel-2: #171c27;
    --line: #232a38;
    --text: #e7ebf3;
    --text-dim: #8892a6;
    --amber: #e3a53d;
    --bull: #3ecf8e;
    --bear: #ef5b5b;
    --neutral: #5b6272;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  header{
    padding:22px 28px 16px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  header .title{ display:flex; align-items:baseline; gap:12px; }
  header h1{ font-size:19px; font-weight:600; margin:0; letter-spacing:0.2px;}
  header .sub{ color:var(--text-dim); font-size:12.5px; }
  .clock{ color:var(--amber); font-size:12.5px; }

  main{ padding:20px 28px 60px; max-width:1180px; margin:0 auto; }

  .panel{
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    margin-bottom:22px; overflow:hidden;
  }
  .panel-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid var(--line); background:var(--panel-2);
    flex-wrap:wrap; gap:10px;
  }
  .panel-head h2{ font-size:14.5px; margin:0; font-weight:600; letter-spacing:.2px; }
  .panel-head .meta{ color:var(--text-dim); font-size:12px; }

  .controls{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  input[type=text]{
    background:#0d1119; border:1px solid var(--line); color:var(--text);
    padding:7px 10px; border-radius:6px; font-size:13px; width:110px;
    font-family:'IBM Plex Mono', monospace;
  }
  input[type=text]:focus{ outline:none; border-color:var(--amber); }
  button{
    background:transparent; border:1px solid var(--line); color:var(--text);
    padding:7px 14px; border-radius:6px; font-size:13px; cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  button:hover{ border-color:var(--amber); color:var(--amber); }
  button.primary{ border-color:var(--amber); color:var(--amber); }
  button:disabled{ opacity:.4; cursor:default; }

  table{ width:100%; border-collapse:collapse; }
  thead th{
    text-align:left; font-size:11px; color:var(--text-dim); font-weight:600;
    text-transform:uppercase; letter-spacing:.6px;
    padding:10px 14px; border-bottom:1px solid var(--line);
  }
  tbody td{
    padding:11px 14px; border-bottom:1px solid var(--line); font-size:13.5px;
    vertical-align:middle;
  }
  tbody tr:last-child td{ border-bottom:none; }
  tbody tr.row-buy{ background:rgba(62,207,142,0.07); box-shadow:inset 3px 0 0 var(--bull); }
  tbody tr.row-short{ background:rgba(239,91,91,0.07); box-shadow:inset 3px 0 0 var(--bear); }

  .sym{ font-weight:600; letter-spacing:.3px; }
  .price{ font-family:'IBM Plex Mono', monospace; color:var(--text-dim); }

  .dot-row{ display:flex; align-items:center; gap:6px; }
  .dot{
    width:9px; height:9px; border-radius:50%; display:inline-block; flex:none;
    border:1px solid var(--neutral); background:transparent;
  }
  .dot.bull{ background:var(--bull); border-color:var(--bull); }
  .dot.bear{ background:var(--bear); border-color:var(--bear); }
  .dot.na{ background:transparent; border-color:#3a4152; }
  .tf-label{ font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono', monospace; }

  .signal-badge{
    font-size:11.5px; padding:3px 9px; border-radius:20px; font-weight:600;
    font-family:'IBM Plex Mono', monospace; white-space:nowrap;
  }
  .signal-badge.buy{ background:rgba(62,207,142,.15); color:var(--bull); }
  .signal-badge.short{ background:rgba(239,91,91,.15); color:var(--bear); }
  .signal-badge.none{ background:transparent; color:var(--text-dim); }

  .remove-btn{
    border:none; background:none; color:var(--text-dim); cursor:pointer; font-size:15px;
  }
  .remove-btn:hover{ color:var(--bear); }

  .empty{ padding:30px 18px; text-align:center; color:var(--text-dim); font-size:13px; }

  .settings{ display:flex; gap:18px; flex-wrap:wrap; padding:16px 18px; font-size:13px; color:var(--text-dim); }
  .settings label{ display:flex; align-items:center; gap:6px; }
  .settings input[type=text]{ width:150px; }

  footer{ text-align:center; color:var(--text-dim); font-size:12px; padding:10px 20px 30px; }

  @media (max-width: 720px){
    thead th:nth-child(2), tbody td:nth-child(2){ display:none; }
    main{ padding:16px; }
  }
</style>
</head>
<body>

<header>
  <div class="title">
    <h1>多周期趋势监控台</h1>
    <span class="sub">15分钟 · 1小时 · 日线 · 周线　EMA20 / 60 / 120 排列共振</span>
  </div>
  <div class="clock mono" id="clock">--:--:--</div>
</header>

<main>

  <!-- 持仓 -->
  <div class="panel">
    <div class="panel-head">
      <h2>我的持仓</h2>
      <div class="controls">
        <input type="text" id="add-symbol" placeholder="如 BTC" maxlength="12">
        <button id="add-btn">添加</button>
        <button id="refresh-holdings-btn">刷新</button>
        <span class="meta" id="holdings-meta">未更新</span>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>币种</th><th>现价</th><th>15m</th><th>1h</th><th>日线</th><th>周线</th><th>共振提示</th><th></th>
        </tr>
      </thead>
      <tbody id="holdings-body">
        <tr><td colspan="8" class="empty">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 推荐 -->
  <div class="panel">
    <div class="panel-head">
      <h2>强势推荐 · 日线多头排列</h2>
      <div class="controls">
        <button id="scan-btn" class="primary">扫描推荐</button>
        <span class="meta" id="recommend-meta">尚未扫描</span>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>币种</th><th>现价</th><th>15m</th><th>1h</th><th>日线</th><th>周线</th><th>共振提示</th><th></th>
        </tr>
      </thead>
      <tbody id="recommend-body">
        <tr><td colspan="8" class="empty">点击右上「扫描推荐」开始</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 设置 -->
  <div class="panel">
    <div class="panel-head"><h2>设置</h2></div>
    <div class="settings">
      <label>自动刷新间隔(分钟，0=关闭)：
        <input type="text" id="interval-input" style="width:60px">
      </label>
      <label>推荐数量：
        <input type="text" id="count-input" style="width:50px">
      </label>
      <label>代理地址(如 http://127.0.0.1:7890)：
        <input type="text" id="proxy-input">
      </label>
      <button id="save-settings-btn">保存设置</button>
    </div>
  </div>

</main>

<footer>数据来自币安(Binance)公开行情接口，仅作技术面参考，不构成投资建议。</footer>

<script src="/static/app.js"></script>
</body>
</html>
